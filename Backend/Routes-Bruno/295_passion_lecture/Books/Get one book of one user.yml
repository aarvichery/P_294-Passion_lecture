info:
  name: Get one book of one user
  type: http
  seq: 7

http:
  method: GET
  url: http://localhost:3333/v1/api/users/:user_id/books/:id
  params:
    - name: user_id
      value: "1"
      type: path
    - name: id
      value: "1"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
