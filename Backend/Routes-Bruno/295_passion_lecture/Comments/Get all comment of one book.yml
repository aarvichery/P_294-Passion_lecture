info:
  name: Get all comment of one book
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3333/v1/api/books/:book_id/comments
  params:
    - name: book_id
      value: "1"
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
