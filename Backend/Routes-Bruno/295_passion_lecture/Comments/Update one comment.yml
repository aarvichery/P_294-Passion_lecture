info:
  name: Update one comment
  type: http
  seq: 5

http:
  method: PUT
  url: http://localhost:3333/v1/api/books/:book_id/comments/:id
  params:
    - name: book_id
      value: "1"
      type: path
    - name: id
      value: "1"
      type: path
  body:
    type: json
    data: |-
      {
          "id": 1,
          "text": "null----",
          "appreciation": "1",
          "userId": 1,
          "bookId": 1
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
